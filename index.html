<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capital Reports</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #e8e8e2;
      --muted: #666;
      --accent: #c8f55a;
      --accent-dim: rgba(200, 245, 90, 0.08);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 60px 40px;
    }

    header {
      max-width: 860px;
      margin: 0 auto 56px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
    }

    .logo {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    h1 span {
      color: var(--accent);
    }

    .count {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .grid {
      max-width: 860px;
      margin: 0 auto;
      display: grid;
      gap: 2px;
    }

    .report-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.15s ease;
      gap: 16px;
    }

    .report-link:hover {
      background: var(--accent-dim);
      border-color: var(--accent);
      transform: translateX(4px);
    }

    .report-link:hover .arrow {
      color: var(--accent);
      transform: translateX(3px);
    }

    .report-left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .index-num {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      width: 24px;
      flex-shrink: 0;
    }

    .report-name {
      font-size: 14px;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tag {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 3px;
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .arrow {
      color: var(--muted);
      font-size: 16px;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    footer {
      max-width: 860px;
      margin: 40px auto 0;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

  <header>
    <div>
      <div class="logo">capital.com · internal</div>
      <h1>Reports <span>&</span> Dashboards</h1>
    </div>
    <div class="count" id="count"></div>
  </header>

  <div class="grid" id="grid"></div>

  <footer id="footer"></footer>

  <script>
    // ─── ADD NEW REPORTS HERE ───────────────────────────────────────────────
    const reports = [
      {
        name: "Payments Action Report — 6M",
        file: "Payments_Action_Report_6M_1.html",
        tag: "Payments"
      },
      {
        name: "LATAM — AI vs Human",
        file: "LATAM_AI_vs_Human_Clean.html",
        tag: "Sales AI"
      },
      {
        name: "Cricket Sponsorship Report v7",
        file: "capital_cricket_sponsorship_report_7.html",
        tag: "Sponsorship"
      },
      {
        name: "AIVA YTD Country Performance",
        file: "AIVA_2026_YTD_Country_Report.html",
        tag: "Sales AI"
      },
    ];
    // ────────────────────────────────────────────────────────────────────────

    const grid = document.getElementById('grid');
    const count = document.getElementById('count');
    const footer = document.getElementById('footer');

    reports.forEach((r, i) => {
      const a = document.createElement('a');
      a.className = 'report-link';
      a.href = r.file;
      a.innerHTML = `
        <div class="report-left">
          <span class="index-num">0${i + 1}</span>
          <span class="report-name">${r.name}</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <span class="tag">${r.tag}</span>
          <span class="arrow">→</span>
        </div>
      `;
      grid.appendChild(a);
    });

    count.textContent = `${reports.length} reports`;
    footer.textContent = `bilalhasham-capital.github.io/capital-reports · updated ${new Date().toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'})}`;
  </script>
</body>
</html>
